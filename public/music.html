<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>KYY Music Room—Premium Audio Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #0e1621;
      --accent-spotify: #1ed760;
      --accent-blue: #3390ec;
      --text-muted: #7f91a4;
      --glass-bg: rgba(23, 33, 43, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-dark);
      color: #ffffff;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .header-glass {
      padding: max(35px, env(safe-area-inset-top)) 15px 15px 15px;
      background: var(--glass-bg);
      backdrop-filter: blur(30px) saturate(190%);
      -webkit-backdrop-filter: blur(30px) saturate(190%);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 10;
    }

    .btn-action-kaca {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      cursor: pointer;
      color: #ffffff;
      transition: transform 0.2s ease;
    }
    .btn-action-kaca:active { transform: scale(0.85); }
    .btn-trash { color: #ff3b30; }

    .chat-area {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .bubble-base {
      align-self: flex-start;
      max-width: 85%;
      padding: 14px 16px;
      background: rgba(23, 33, 43, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border-top-left-radius: 4px;
      font-size: 14.5px;
    }

    .track-selection-panel {
      width: 90%;
      max-width: 335px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.01));
      backdrop-filter: blur(25px) saturate(160%);
      -webkit-backdrop-filter: blur(25px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-self: flex-start;
    }

    .track-item-btn {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      color: #ffffff;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
    }
    .track-item-btn span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .track-item-btn:active { background: rgba(51, 144, 236, 0.25); border-color: var(--accent-blue); }

    .pro-audio-card {
      width: 90%;
      max-width: 335px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02));
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      display: none;
      flex-direction: column;
      gap: 12px;
      align-self: flex-start;
    }

    .audio-interface-main { display: flex; align-items: center; gap: 14px; }

    .disc-vinyl-logo {
      width: 50px; height: 50px; border-radius: 50%;
      background: radial-gradient(circle, #282828 35%, #121212 100%);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--accent-spotify);
    }
    .disc-vinyl-logo.playing { animation: putarPiringan 4s linear infinite; }

    @keyframes putarPiringan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .track-meta-info { flex: 1; overflow: hidden; }

    .timeline-container { width: 100%; display: flex; flex-direction: column; gap: 4px; }
    .timeline-slider {
      width: 100%; -webkit-appearance: none; appearance: none;
      height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    .timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%; background: #ffffff;
      box-shadow: 0 0 4px #000; cursor: pointer;
    }

    .audio-controls-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    
    .control-play-pause-btn {
      background: transparent; border: none; color: #fff; font-size: 36px; cursor: pointer; outline: none;
      display: flex; align-items: center; transition: transform 0.1s ease;
    }
    .control-play-pause-btn:active { transform: scale(0.9); }

    .btn-download-kaca {
      padding: 8px 14px; border-radius: 14px; background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight);
      color: #fff; font-size: 11.5px; font-weight: 700;
      display: flex; align-items: center; gap: 6px; text-decoration: none; cursor: pointer;
    }

    .footer-bar-input {
      padding: 12px 15px max(20px, env(safe-area-inset-bottom)) 15px;
      background: rgba(13, 17, 23, 0.55); backdrop-filter: blur(40px);
      border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 12px;
    }

    .capsule-input-glass {
      flex: 1; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; padding: 11px 18px;
    }
    .capsule-input-glass input {
      width: 100%; background: transparent; border: none; color: #ffffff; font-size: 14.5px; outline: none;
    }

    .kyy-overlay-kaca {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: all 0.3s ease;
    }
    .kyy-overlay-kaca.show { opacity: 1; pointer-events: auto; backdrop-filter: blur(20px) saturate(180%); }

    .popup-glass-card { width: 85%; max-width: 290px; background: rgba(30, 44, 57, 0.8); border: 1px solid var(--glass-border); border-radius: 22px; padding: 22px 18px 14px 18px; text-align: center; }
    .popup-btn-container { margin-top: 20px; display: flex; gap: 10px; }
    .popup-btn { flex: 1; padding: 11px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04); color: #ffffff; font-size: 14px; cursor: pointer; }
    .popup-btn-confirm { background: linear-gradient(135deg, #ff3b30, #d32f2f); border: none; }

    .error-status { color: #ff3b30; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>

  <header class="header-glass">
    <div class="btn-action-kaca" onclick="window.location.href='index_4.html'"><i class="fas fa-arrow-left"></i></div>
    <div style="text-align: center;">
      <h3 style="font-size: 16px; font-weight: 800;">KYY Music Pro</h3>
      <span style="font-size: 10px; color: var(--accent-spotify); font-weight: 800;"><i class="fas fa-waveform"></i> INTERACTIVE AUDIO</span>
    </div>
    <div class="btn-action-kaca btn-trash" onclick="kyyBukaPopupKonfirmasi()"><i class="fas fa-trash-alt"></i></div>
  </header>

  <main class="chat-area" id="kyy-music-scroller"></main>

  <footer class="footer-bar-input">
    <div class="capsule-input-glass">
      <input type="text" id="kyy-music-raw-input" placeholder="Ketik judul lagu / paste link YouTube..." autocomplete="off">
    </div>
    <button class="btn-action-kaca" onclick="kyyExecuteEngineMusik()" style="background: linear-gradient(135deg, var(--accent-blue), #1c74ca); border:none; width:42px; height:42px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </footer>

  <div class="kyy-overlay-kaca" id="kyy-modal-konfirmasi">
    <div class="popup-glass-card">
      <div style="font-size: 26px; color: #ff3b30; margin-bottom: 10px;"><i class="fas fa-exclamation-triangle"></i></div>
      <h4 style="font-size: 16px; font-weight: 700;">Hapus Riwayat Chat?</h4>
      <p style="font-size: 13px; color: var(--text-muted); margin-top: 5px;">Tindakan ini akan mengosongkan panel room musik di memori HP lu.</p>
      <div class="popup-btn-container">
        <button class="popup-btn" onclick="kyyTutupPopupKonfirmasi()">Batal</button>
        <button class="popup-btn popup-btn-confirm" onclick="kyyEksekusiHapusHistory()">Hapus</button>
      </div>
    </div>
  </div>

  <script>
    const kyyAudioEngine = new Audio(); 
    kyyAudioEngine.crossOrigin = "anonymous";
    kyyAudioEngine.preload = "auto";
    let currentActiveCardId = null;
    let isUserDragging = false;

    // Volume default
    kyyAudioEngine.volume = 0.8;

    // Helper: timeout wrapper untuk browser lama
    const kyyFetchWithTimeout = (url, timeout = 8000) => {
      return Promise.race([
        fetch(url),
        new Promise((_, reject) => 
          setTimeout(() => reject(new Error('Timeout')), timeout)
        )
      ]);
    };

    // MULTIPLE FALLBACK SERVICES
    const AUDIO_SERVICES = [
      { 
        name: 'Piped 🎵',
        fetch: async (id) => {
          const instances = ['https://piped-api.kavin.rocks', 'https://pipedapi.adminforge.de', 'https://pipedapi.tokhmi.xyz'];
          for (let inst of instances) {
            try {
              console.log(`[Piped] Trying ${inst}...`);
              const r = await kyyFetchWithTimeout(`${inst}/streams/${id}`, 6000);
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              const d = await r.json();
              const audio = d.audioStreams?.[0];
              if (audio?.url) {
                console.log(`[Piped] ✓ Got audio from ${inst}`);
                return audio.url;
              }
            } catch (e) { 
              console.log(`[Piped] Failed ${inst}:`, e.message);
            }
          }
          throw new Error('Piped: Semua instance gagal');
        }
      },
      {
        name: 'Invidious 🎬',
        fetch: async (id) => {
          const instances = ['https://inv.nadeko.net', 'https://invidious.jing.rocks'];
          for (let inst of instances) {
            try {
              console.log(`[Invidious] Trying ${inst}...`);
              const r = await kyyFetchWithTimeout(`${inst}/api/v1/videos/${id}`, 6000);
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              const d = await r.json();
              const audio = d.adaptiveFormats?.find(f => f.type?.includes('audio') && f.url);
              if (audio?.url) {
                console.log(`[Invidious] ✓ Got audio from ${inst}`);
                return audio.url;
              }
            } catch (e) { 
              console.log(`[Invidious] Failed ${inst}:`, e.message);
            }
          }
          throw new Error('Invidious: Semua instance gagal');
        }
      },
      {
        name: 'YouTube Proxy 🌐',
        fetch: async (id) => {
          console.log('[YouTube Proxy] Trying...');
          // Try embedding YouTube video directly
          try {
            const r = await kyyFetchWithTimeout(`https://www.youtube.com/watch?v=${id}`, 5000);
            if (r.ok) {
              // Return embedded player with audio
              return `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1`;
            }
          } catch (e) {
            console.log('[YouTube Proxy] Direct embed failed');
          }
          throw new Error('YouTube proxy gagal');
        }
      }
    ];

    function kyyGetNowTime() {
        const d = new Date(); let h = d.getHours(); let m = d.getMinutes();
        return `${h % 12 || 12}:${m < 10 ? '0'+m : m} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function formatDurasi(detik) {
        if (isNaN(detik) || detik < 0) return "00:00";
        let m = Math.floor(detik / 60); let s = Math.floor(detik % 60);
        return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const scroller = document.getElementById('kyy-music-scroller');
        const savedHistory = localStorage.getItem('kyy_music_history_modular');
        if (savedHistory && scroller) { 
            scroller.innerHTML = savedHistory; 
            kyyResetStatusUI();
        } else { 
            kyyCetakWelcome(); 
        }
        if (scroller) scroller.scrollTop = scroller.scrollHeight;

        document.getElementById('kyy-music-raw-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') kyyExecuteEngineMusik();
        });
    });

    function kyyCetakWelcome() {
        document.getElementById('kyy-music-scroller').innerHTML = `
            <div class="bubble-base">
                🎧 <b>KYY Professional Music Room v4.5</b><br><br>
                Mendukung 8 rekomendasi trek akurat, kontrol Play/Pause interaktif, serta timeline musik yang bisa digeser dan diseret secara nyata!
            </div>
        `;
    }

    function kyyResetStatusUI() {
        document.querySelectorAll('.control-play-pause-btn').forEach(btn => {
            btn.innerHTML = `<i class="fas fa-play-circle" style="color: #fff;"></i>`;
        });
        document.querySelectorAll('.disc-vinyl-logo').forEach(disc => {
            disc.classList.remove('playing');
        });
    }

    function kyyExecuteEngineMusik() {
        const inputEl = document.getElementById('kyy-music-raw-input');
        const scroller = document.getElementById('kyy-music-scroller');
        if (!inputEl || !scroller || !inputEl.value.trim()) return;

        const kueriUser = inputEl.value.trim();
        const waktuSekarang = kyyGetNowTime();

        const bubbleUser = document.createElement('div');
        bubbleUser.className = 'bubble-base';
        bubbleUser.style.alignSelf = 'flex-end';
        bubbleUser.style.background = 'var(--accent-blue)';
        bubbleUser.style.borderTopLeftRadius = '20px';
        bubbleUser.style.borderTopRightRadius = '4px';
        bubbleUser.innerHTML = `${kueriUser} <span style="font-size:10px; opacity:0.6; float:right; margin:8px 0 0 10px;">${waktuSekarang}</span>`;
        scroller.appendChild(bubbleUser);

        inputEl.value = '';
        scroller.scrollTop = scroller.scrollHeight;

        const loadingBubble = document.createElement('div');
        loadingBubble.className = 'bubble-base';
        loadingBubble.innerHTML = `⏳ <i>Mensinkronisasi 8 trek audio akurat untuk lu...</i>`;
        scroller.appendChild(loadingBubble);

        fetch('/api/server', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ kueriUser: kueriUser, waktu: waktuSekarang })
        })
        .then(res => res.json())
        .then(respon => {
            loadingBubble.remove();

            if (respon.success && respon.data && respon.data.length > 0) {
                const panelTrek = document.createElement('div');
                panelTrek.className = 'track-selection-panel';

                let htmlTombol = `<div style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px;"><i class="fas fa-music"></i> Pilih Trek Audio Asli (${respon.data.length}):</div>`;
                
                respon.data.forEach((trek) => {
                    htmlTombol += `
                        <button class="track-item-btn" onclick="kyyInitAudioPlayer('${trek.judul.replace(/'/g, "\\'")}', '${trek.id}')">
                            <i class="fas fa-play" style="color:var(--accent-spotify);"></i> 
                            <span>${trek.judul}</span>
                        </button>
                    `;
                });

                panelTrek.innerHTML = htmlTombol;
                scroller.appendChild(panelTrek);
            } else {
                const errorBubble = document.createElement('div');
                errorBubble.className = 'bubble-base';
                errorBubble.innerHTML = `❌ Gagal memuat trek akurat. Periksa kembali kueri lu.`;
                scroller.appendChild(errorBubble);
            }
            scroller.scrollTop = scroller.scrollHeight;
            localStorage.setItem('kyy_music_history_modular', scroller.innerHTML);
        })
        .catch(err => {
            loadingBubble.remove();
            console.error('Error:', err);
            const errorBubble = document.createElement('div');
            errorBubble.className = 'bubble-base';
            errorBubble.innerHTML = `❌ Koneksi error. Coba lagi.`;
            scroller.appendChild(errorBubble);
        });
    }

    // FUNGSI CORE: STREAM AUDIO DARI PIPED (RELIABLE)
    async function kyyInitAudioPlayer(judulAsli, videoId) {
        const scroller = document.getElementById('kyy-music-scroller');
        const cardId = "card_" + new Date().getTime();
        
        currentActiveCardId = cardId;
        isUserDragging = false;

        const oldCard = document.querySelector('.pro-audio-card');
        if (oldCard) oldCard.remove();

        const playerCard = document.createElement('div');
        playerCard.className = 'pro-audio-card';
        playerCard.id = cardId;
        playerCard.style.display = 'flex';

        playerCard.innerHTML = `
            <div class="audio-interface-main">
                <div class="disc-vinyl-logo" id="disc_${cardId}"><i class="fas fa-compact-disc"></i></div>
                <div class="track-meta-info">
                    <div style="font-size: 11px; font-weight: 800; color: var(--accent-spotify); text-transform: uppercase;"><i class="fas fa-waveform"></i> Audio Pro Live</div>
                    <div style="font-size: 13.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;">${judulAsli}</div>
                </div>
            </div>

            <div class="timeline-container">
                <input type="range" class="timeline-slider" id="slider_${cardId}" value="0" min="0" max="100" 
                    onmousedown="isUserDragging=true" 
                    ontouchstart="isUserDragging=true"
                    onchange="kyyUserGeserTimeline(this.value)"
                    oninput="document.getElementById('time_current_${cardId}').innerText = formatDurasi(this.value)">
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted);">
                    <span id="time_current_${cardId}">00:00</span>
                    <span id="time_total_${cardId}">00:00</span>
                </div>
            </div>

            <div class="audio-controls-row">
                <button class="control-play-pause-btn" id="btn_ctrl_${cardId}" onclick="kyyTogglePlayPause('${cardId}')">
                    <i class="fas fa-play-circle" style="color: #fff;"></i>
                </button>
                <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(judulAsli)}" target="_blank" class="btn-download-kaca">
                    <i class="fas fa-youtube" style="color: #ff0000;"></i> YouTube
                </a>
            </div>
            <div id="status_${cardId}"></div>
        `;

        scroller.appendChild(playerCard);
        setTimeout(() => {
            playerCard.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }, 100);

        // FETCH AUDIO DARI MULTIPLE SERVICES
        try {
            const audioUrl = await kyyCariAudioStreamPiped(videoId, cardId);
            
            if (audioUrl) {
                // Clear previous handlers
                kyyAudioEngine.onloadedmetadata = null;
                kyyAudioEngine.ontimeupdate = null;
                kyyAudioEngine.onerror = null;
                kyyAudioEngine.onended = null;

                kyyAudioEngine.src = audioUrl;
                
                let retryCount = 0;
                const maxRetries = 2;
                
                kyyAudioEngine.onloadedmetadata = () => {
                    console.log(`[KYY] Metadata loaded: ${kyyAudioEngine.duration}s`);
                    const txtTotal = document.getElementById(`time_total_${cardId}`);
                    const slider = document.getElementById(`slider_${cardId}`);
                    if (txtTotal) txtTotal.innerText = formatDurasi(kyyAudioEngine.duration);
                    if (slider) slider.max = Math.floor(kyyAudioEngine.duration);
                };

                kyyAudioEngine.ontimeupdate = () => {
                    if (isUserDragging) return;
                    const slider = document.getElementById(`slider_${cardId}`);
                    const txtCur = document.getElementById(`time_current_${cardId}`);
                    if (slider) slider.value = Math.floor(kyyAudioEngine.currentTime);
                    if (txtCur) txtCur.innerText = formatDurasi(kyyAudioEngine.currentTime);
                };

                kyyAudioEngine.onerror = async (e) => {
                    console.error(`[KYY] Audio error:`, e, kyyAudioEngine.error?.code);
                    const status = document.getElementById(`status_${cardId}`);
                    if (status) status.innerHTML = `<div class="error-status">❌ Error: ${kyyAudioEngine.error?.message || 'Unknown'}</div>`;
                    
                    // Retry dengan service berbeda
                    if (retryCount < maxRetries) {
                        retryCount++;
                        console.log(`[KYY] Retry ${retryCount}/${maxRetries}...`);
                        try {
                            const newUrl = await kyyCariAudioStreamPiped(videoId, cardId);
                            if (newUrl) {
                                kyyAudioEngine.src = newUrl;
                                kyyAudioEngine.load();
                            }
                        } catch (err) {
                            console.error('[KYY] Retry failed:', err);
                        }
                    }
                };

                kyyAudioEngine.onended = () => {
                    kyyUbahVisualUI(cardId, false);
                };

                kyyAudioEngine.load();
                
                // Coba play dengan delay
                setTimeout(() => {
                    kyyAudioEngine.play()
                        .then(() => {
                            console.log('[KYY] ▶ Playing...');
                            kyyUbahVisualUI(cardId, true);
                        })
                        .catch(err => {
                            console.error('[KYY] Play error:', err);
                            const status = document.getElementById(`status_${cardId}`);
                            if (status) status.innerHTML = `<div class="error-status">❌ Tidak bisa main: ${err.message}</div>`;
                        });
                }, 300);
            }
        } catch (error) {
            console.error('[KYY] Init error:', error);
            const status = document.getElementById(`status_${cardId}`);
            if (status) status.innerHTML = `<div class="error-status">❌ ${error.message}</div>`;
        }

        localStorage.setItem('kyy_music_history_modular', scroller.innerHTML);
    }

    async function kyyCariAudioStreamPiped(videoId, cardId) {
        const statusEl = document.getElementById(`status_${cardId}`);
        
        for (let service of AUDIO_SERVICES) {
            try {
                if (statusEl) statusEl.innerHTML = `<div class="error-status">⏳ Coba ${service.name}...</div>`;
                console.log(`[KYY] Trying ${service.name} for ${videoId}`);
                
                const audioUrl = await service.fetch(videoId);
                
                if (audioUrl) {
                    console.log(`[KYY] ✓ ${service.name} success`);
                    if (statusEl) statusEl.innerHTML = `<div style="color: var(--accent-spotify); font-size: 11px;">✓ Source: ${service.name}</div>`;
                    return audioUrl;
                }
            } catch (error) {
                console.log(`[KYY] ✗ ${service.name} failed:`, error.message);
                if (statusEl) statusEl.innerHTML = `<div class="error-status">✗ ${service.name} gagal</div>`;
                continue;
            }
        }
        
        throw new Error('Semua service gagal. Coba lagu lain atau periksa koneksi.');
    }

    function kyyTogglePlayPause(cardId) {
        if (kyyAudioEngine.src === "" || currentActiveCardId !== cardId) return;

        if (kyyAudioEngine.paused) {
            kyyAudioEngine.play()
                .then(() => kyyUbahVisualUI(cardId, true))
                .catch(err => console.error(err));
        } else {
            kyyAudioEngine.pause();
            kyyUbahVisualUI(cardId, false);
        }
    }

    function kyyUbahVisualUI(cardId, isPlaying) {
        const btn = document.getElementById(`btn_ctrl_${cardId}`);
        const disc = document.getElementById(`disc_${cardId}`);

        if (isPlaying) {
            if (btn) btn.innerHTML = `<i class="fas fa-pause-circle" style="color: var(--accent-spotify);"></i>`;
            if (disc) disc.classList.add('playing');
        } else {
            if (btn) btn.innerHTML = `<i class="fas fa-play-circle" style="color: #fff;"></i>`;
            if (disc) disc.classList.remove('playing');
        }
    }

    function kyyUserGeserTimeline(nilaiBaru) {
        isUserDragging = false;
        kyyAudioEngine.currentTime = parseInt(nilaiBaru);
    }

    function kyyBukaPopupKonfirmasi() { document.getElementById('kyy-modal-konfirmasi')?.classList.add('show'); }
    function kyyTutupPopupKonfirmasi() { document.getElementById('kyy-modal-konfirmasi')?.classList.remove('show'); }
    function kyyEksekusiHapusHistory() {
        localStorage.removeItem('kyy_music_history_modular');
        kyyAudioEngine.pause();
        kyyAudioEngine.src = "";
        kyyCetakWelcome();
        kyyTutupPopupKonfirmasi();
    }
  </script>
</body>
</html>
