<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>KYY Music Room—Premium Glass</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #0e1621;
      --accent-spotify: #1ed760;
      --accent-blue: #3390ec;
      --text-muted: #7f91a4;
      --glass-bg: rgba(23, 33, 43, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-dark);
      color: #ffffff;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* HEADER */
    .header-glass {
      padding: max(35px, env(safe-area-inset-top)) 15px 15px 15px;
      background: var(--glass-bg);
      backdrop-filter: blur(30px) saturate(190%);
      -webkit-backdrop-filter: blur(30px) saturate(190%);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 10;
    }

    .btn-action-kaca {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      cursor: pointer;
      color: #ffffff;
      transition: transform 0.2s ease;
    }
    .btn-action-kaca:active { transform: scale(0.85); }
    .btn-trash { color: #ff3b30; }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .bubble-base {
      align-self: flex-start;
      max-width: 85%;
      padding: 14px 16px;
      background: rgba(23, 33, 43, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border-top-left-radius: 4px;
      font-size: 14.5px;
      word-break: break-word;
    }

    /* 🎵 PANEL DAFTAR TREK PILIHAN KACA */
    .track-selection-panel {
      width: 88%;
      max-width: 320px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.01));
      backdrop-filter: blur(25px) saturate(160%);
      -webkit-backdrop-filter: blur(25px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-self: flex-start;
    }

    /* TOMBOL PILIHAN LAGU */
    .track-item-btn {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: #ffffff;
      text-align: left;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
    }
    .track-item-btn span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .track-item-btn:active {
      background: rgba(51, 144, 236, 0.3);
      border-color: var(--accent-blue);
      transform: scale(0.97);
    }

    /* DYNAMIC MINI PLAYER PANEL */
    .live-player-card {
      width: 88%;
      max-width: 320px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-self: flex-start;
    }

    /* FOOTER INPUT */
    .footer-bar-input {
      padding: 12px 15px max(20px, env(safe-area-inset-bottom)) 15px;
      background: rgba(13, 17, 23, 0.55);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .capsule-input-glass {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 11px 18px;
    }
    .capsule-input-glass input {
      width: 100%; background: transparent; border: none; color: #ffffff; font-size: 14.5px; outline: none;
    }

    /* MODAL ULTRA GLASS */
    .kyy-overlay-kaca {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: all 0.3s ease;
    }
    .kyy-overlay-kaca.show {
      opacity: 1; pointer-events: auto;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
    }
    .popup-glass-card {
      width: 85%; max-width: 290px;
      background: rgba(30, 44, 57, 0.8);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      border-radius: 22px;
      padding: 22px 18px 14px 18px;
      text-align: center;
    }
    .popup-btn-container { margin-top: 20px; display: flex; gap: 10px; }
    .popup-btn { flex: 1; padding: 11px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04); color: #ffffff; font-size: 14px; cursor: pointer; }
    .popup-btn-confirm { background: linear-gradient(135deg, #ff3b30, #d32f2f); border: none; }
  </style>
</head>
<body>

  <header class="header-glass">
    <div class="btn-action-kaca" onclick="window.location.href='index_4.html'"><i class="fas fa-arrow-left"></i></div>
    <div style="text-align: center;">
      <h3 style="font-size: 16px; font-weight: 800;">KYY Music</h3>
      <span style="font-size: 11px; color: var(--accent-spotify); font-weight: 800;"><i class="fas fa-list-ul"></i> TRACK COMPONENT ACTIVE</span>
    </div>
    <div class="btn-action-kaca btn-trash" onclick="kyyBukaPopupKonfirmasi()"><i class="fas fa-trash-alt"></i></div>
  </header>

  <main class="chat-area" id="kyy-music-scroller"></main>

  <footer class="footer-bar-input">
    <div class="capsule-input-glass">
      <input type="text" id="kyy-music-raw-input" placeholder="Ketik judul lagu favorit lu..." autocomplete="off">
    </div>
    <button class="btn-action-kaca" onclick="kyyExecuteEngineMusik()" style="background: linear-gradient(135deg, var(--accent-blue), #1c74ca); border:none; width:42px; height:42px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </footer>

  <!-- POP-UP ULTRA GLASS -->
  <div class="kyy-overlay-kaca" id="kyy-modal-konfirmasi">
    <div class="popup-glass-card">
      <div style="font-size: 26px; color: #ff3b30; margin-bottom: 10px;"><i class="fas fa-exclamation-triangle"></i></div>
      <h4 style="font-size: 16px; font-weight: 700;">Hapus Riwayat Chat?</h4>
      <p style="font-size: 13px; color: var(--text-muted); margin-top: 5px;">Tindakan ini akan mengosongkan panel pencarian musik di memori HP lu.</p>
      <div class="popup-btn-container">
        <button class="popup-btn" onclick="kyyTutupPopupKonfirmasi()">Batal</button>
        <button class="popup-btn popup-btn-confirm" onclick="kyyEksekusiHapusHistory()">Hapus</button>
      </div>
    </div>
  </div>

  <script>
    function kyyGetNowTime() {
        const d = new Date(); let h = d.getHours(); let m = d.getMinutes();
        return `${h % 12 || 12}:${m < 10 ? '0'+m : m} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const scroller = document.getElementById('kyy-music-scroller');
        const savedHistory = localStorage.getItem('kyy_music_history_modular');
        if (savedHistory && scroller) { scroller.innerHTML = savedHistory; } 
        else { kyyCetakWelcome(); }
        if (scroller) scroller.scrollTop = scroller.scrollHeight;

        document.getElementById('kyy-music-raw-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') kyyExecuteEngineMusik();
        });
    });

    function kyyCetakWelcome() {
        document.getElementById('kyy-music-scroller').innerHTML = `
            <div class="bubble-base">
                🎵 <b>KYY Music Room v3.5</b><br><br>
                Ketikkan kata kunci judul lagu. Sistem otomatis menyajikan rekomendasi trek siap pilih!
            </div>
        `;
    }

    function kyyExecuteEngineMusik() {
        const inputEl = document.getElementById('kyy-music-raw-input');
        const scroller = document.getElementById('kyy-music-scroller');
        if (!inputEl || !scroller || !inputEl.value.trim()) return;

        const kueriUser = inputEl.value.trim();
        const waktuSekarang = kyyGetNowTime();

        // Cetak balon teks user di kanan layar[span_8](start_span)[span_8](end_span)
        const bubbleUser = document.createElement('div');
        bubbleUser.className = 'bubble-base';
        bubbleUser.style.alignSelf = 'flex-end';
        bubbleUser.style.background = 'var(--accent-blue)';
        bubbleUser.style.borderTopLeftRadius = '20px';
        bubbleUser.style.borderTopRightRadius = '4px';
        bubbleUser.innerHTML = `${kueriUser} <span style="font-size:10px; opacity:0.6; float:right; margin:8px 0 0 10px;">${waktuSekarang}</span>`;
        scroller.appendChild(bubbleUser);

        inputEl.value = '';
        scroller.scrollTop = scroller.scrollHeight;

        // Tampilkan loading indikator tipis ala iOS[span_9](start_span)[span_9](end_span)
        const loadingBubble = document.createElement('div');
        loadingBubble.className = 'bubble-base';
        loadingBubble.innerHTML = `⏳ <i>Mencari trek live untuk "${kueriUser}"...</i>`;
        scroller.appendChild(loadingBubble);

        // Tembak data ke backend serverless[span_10](start_span)[span_10](end_span)
        fetch('/api/server', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ kueriUser: kueriUser, waktu: waktuSekarang })
        })
        .then(res => res.json())
        .then(respon => {
            loadingBubble.remove();

            if (respon.success && respon.data && respon.data.length > 0) {
                const panelTrek = document.createElement('div');
                panelTrek.className = 'track-selection-panel';

                let htmlTombol = `<div style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px;"><i class="fab fa-youtube"></i> Hasil Live Teratas:</div>`;
                
                // Render list tombol pilihan dari backend[span_11](start_span)[span_11](end_span)
                respon.data.forEach((trek) => {
                    htmlTombol += `
                        <button class="track-item-btn" onclick="kyyPilihJudulSpesifik('${escape(trek.judul)}', '${trek.id}')">
                            <i class="fas fa-play-circle" style="color:var(--accent-spotify);"></i> 
                            <span>${trek.judul}</span>
                        </button>
                    `;
                });

                panelTrek.innerHTML = htmlTombol;
                scroller.appendChild(panelTrek);
            } else {
                const errorBubble = document.createElement('div');
                errorBubble.className = 'bubble-base';
                errorBubble.innerHTML = `❌ Trek tidak ditemukan atau server sibuk.`;
                scroller.appendChild(errorBubble);
            }
            scroller.scrollTop = scroller.scrollHeight;
            localStorage.setItem('kyy_music_history_modular', scroller.innerHTML);
        })
        .catch(err => {
            loadingBubble.remove();
            console.error(err);
        });
    }

    // LOGIKA PERBAIKAN: EKSEKUSI PEMUTARAN WIDGET JENDELA KACA LIVE PLAYER
    function kyyPilihJudulSpesifik(judulEscaped, videoId) {
        const judulAsli = unescape(judulEscaped);
        const waktuSekarang = kyyGetNowTime();
        const scroller = document.getElementById('kyy-music-scroller');
        
        // 1. Tembak webhook notifikasi lagu terpilih ke Telegram
        fetch('/api/server', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ kueriUser: `[PLAYING] ${judulAsli} (ID: ${videoId})`, waktu: waktuSekarang })
        });

        // 2. Render container khusus bermotif ultra glass player
        const playerContainer = document.createElement('div');
        playerContainer.className = 'live-player-card';

        // Konfigurasi tautan YouTube Embed yang aman dari blokir lisensi seluler
        const securePlayerUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&controls=1`;

        playerContainer.innerHTML = `
            <div style="font-size: 11px; font-weight: 900; color: var(--accent-spotify); text-transform: uppercase; letter-spacing: 0.5px;"><i class="fas fa-compact-disc fa-spin"></i> Now Streaming</div>
            <div style="font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color:#fff;">${judulAsli}</div>
            
            <!-- Area Iframe Player Kaca -->
            <div style="border-radius: 14px; overflow: hidden; background: #000; margin-top: 4px; height: 160px; border: 1px solid rgba(255,255,255,0.08);">
                <iframe 
                    src="${securePlayerUrl}" 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen 
                    style="display: block; width: 100%; height: 100%;">
                </iframe>
            </div>

            <div style="margin-top: 2px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-muted);">
                <span><i class="fas fa-shield-alt"></i> Secure Stream Path</span>
                <span style="opacity: 0.5;">${waktuSekarang}</span>
            </div>
        `;
        
        scroller.appendChild(playerContainer);
        scroller.scrollTop = scroller.scrollHeight;
        localStorage.setItem('kyy_music_history_modular', scroller.innerHTML);
    }

    // POP-UP MANAGEMENT
    function kyyBukaPopupKonfirmasi() { document.getElementById('kyy-modal-konfirmasi')?.classList.add('show'); }
    function kyyTutupPopupKonfirmasi() { document.getElementById('kyy-modal-konfirmasi')?.classList.remove('show'); }
    function kyyEksekusiHapusHistory() {
        localStorage.removeItem('kyy_music_history_modular');
        kyyCetakWelcome();
        kyyTutupPopupKonfirmasi();
    }
  </script>
</body>
</html>
